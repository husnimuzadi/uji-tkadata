<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konfirmasi Data - SMP Darut Tauhid</title>
    <style>
        :root { 
            --pusmendik-blue: #3d79b8; 
            --bg-gray: #f4f7f9; 
            --primary-blue: #007bff; 
        }
        
        body, html { 
            margin: 0; padding: 0; min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background-color: var(--bg-gray); 
        }
        
        .header-bg { 
            background-color: var(--pusmendik-blue); 
            height: 250px; 
            width: 100%;
            position: absolute;
            top: 0;
            z-index: 1;
        }

        .wrapper {
            position: relative;
            z-index: 2;
            max-width: 1100px; 
            margin: 0 auto;
            padding: 30px 20px;
        }

        .top-nav {
            display: flex;
            justify-content: space-between;
            color: white;
            margin-bottom: 40px;
        }

        .logo-section { display: flex; align-items: center; gap: 12px; }
        .logo-section img { height: 45px; }
        .logo-section h1 { margin: 0; font-size: 20px; letter-spacing: 1px; }

        .main-grid {
            display: grid;
            grid-template-columns: 320px 1fr; 
            gap: 25px;
            align-items: start;
        }

        .card { 
            background: white; 
            padding: 25px; 
            border-radius: 8px; 
            box-shadow: 0 5px 25px rgba(0,0,0,0.15); 
            box-sizing: border-box;
        }

        .token-box { display: flex; justify-content: space-between; align-items: center; }
        .btn-refresh { 
            background: var(--primary-blue); color: white; border: none; 
            padding: 6px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; 
        }

        .card h2 { font-weight: 500; font-size: 18px; margin: 0 0 25px 0; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .form-group { margin-bottom: 20px; }
        .label { font-size: 11px; color: #999; font-weight: 600; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .val-text { font-size: 15px; color: #333; font-weight: 500; border-bottom: 1px solid #f0f0f0; padding-bottom: 5px; display: block; }
        
        input[type="text"], select {
            width: 100%; border: none; border-bottom: 1px solid #ccc; padding: 8px 0;
            font-size: 14px; outline: none; background: transparent; font-family: inherit;
        }

        .dob-row { display: flex; gap: 10px; margin-top: 5px; }
        .btn-submit { 
            width: 100%; background: var(--primary-blue); color: white; border: none; 
            padding: 14px; border-radius: 5px; font-size: 15px; font-weight: bold; 
            cursor: pointer; margin-top: 20px;
        }

        @media (max-width: 850px) {
            .main-grid { grid-template-columns: 1fr; }
            .header-bg { height: 350px; }
            .wrapper { padding: 15px; }
        }
    </style>
</head>
<body>

    <div class="header-bg"></div>

    <div class="wrapper">
        <div class="top-nav">
            <div class="logo-section">
                <img src="https://upload.wikimedia.org/wikipedia/commons/9/9c/Logo_of_Ministry_of_Education_and_Culture_of_Republic_of_Indonesia.svg" alt="Logo">
                <div>
                    <h1>PUSMENDIK</h1>
                    <div style="font-size: 11px; opacity: 0.8;">APLIKASI ANBK</div>
                </div>
            </div>
            <div id="userTop" style="font-size: 11px; text-align: right;"></div>
        </div>

        <div class="main-grid">
            <div class="card token-box">
                <div>
                    <div style="font-size: 13px; color: #666;">Token :</div>
                    <div id="tokenBox" style="font-size: 22px; font-weight: bold; letter-spacing: 1px;">------</div>
                </div>
                <button class="btn-refresh" onclick="generateToken()">Refresh</button>
            </div>

            <div class="card">
                <h2>Konfirmasi data Peserta</h2>

                <div class="form-group">
                    <label class="label">Kode NIK/NISN</label>
                    <span class="val-text" id="nikDisplay"></span>
                </div>

                <div class="form-group">
                    <label class="label">Nama Peserta</label>
                    <span class="val-text" id="namaDisplay"></span>
                </div>

                <div class="form-group">
                    <label class="label">Jenis Kelamin</label>
                    <select><option>Laki-Laki</option><option>Perempuan</option></select>
                </div>

                <div class="form-group">
                    <label class="label">Mata Ujian</label>
                    <select id="selMataUjian">
                        <option value="literasi.html">Literasi TKA 2026</option>
                        <option value="numerasi.html">Numerasi TKA 2026</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="label">Ketikkan Nama Peserta</label>
                    <input type="text" id="inputNamaCheck" placeholder="Ketikkan Nama Lengkap" autocomplete="off">
                </div>

                <div class="form-group">
                    <label class="label">Tanggal Lahir</label>
                    <div class="dob-row">
                        <select id="selHari"></select>
                        <select id="selBulan"></select>
                        <select id="selTahun"></select>
                    </div>
                </div>

                <div class="form-group" style="margin-top: 30px;">
                    <label class="label" style="color: var(--primary-blue);">Token</label>
                    <input type="text" id="tokenInput" placeholder="Ketikkan token di sini" style="text-transform: uppercase; font-weight: bold; letter-spacing: 2px;">
                </div>

                <button class="btn-submit" onclick="validateAndGo()">Submit</button>
            </div>
        </div>
    </div>

    <script>
        const dataSiswa = JSON.parse(sessionStorage.getItem("user_login"));

        window.onload = function() {
            if(!dataSiswa) { 
                // Jika data tidak ada, lempar kembali ke login
                window.location.href = "login.html"; 
                return; 
            }

            document.getElementById('userTop').innerText = dataSiswa.username + " - " + dataSiswa.nama + " 🎓";
            document.getElementById('nikDisplay').innerText = dataSiswa.username;
            document.getElementById('namaDisplay').innerText = dataSiswa.nama;

            // Menampilkan data lahir dari session
            document.getElementById('selHari').innerHTML = `<option>${dataSiswa.hari}</option>`;
            document.getElementById('selBulan').innerHTML = `<option>${dataSiswa.bulan}</option>`;
            document.getElementById('selTahun').innerHTML = `<option>${dataSiswa.tahun}</option>`;
            
            generateToken();
        };

        function generateToken() {
            const result = Math.random().toString(36).substring(2, 8).toUpperCase();
            document.getElementById('tokenBox').innerText = result;
        }

        function validateAndGo() {
            const inputNama = document.getElementById('inputNamaCheck').value.trim().toUpperCase();
            const inputToken = document.getElementById('tokenInput').value.trim().toUpperCase();
            const tokenAsli = document.getElementById('tokenBox').innerText;
            
            // Ambil URL tujuan dari value mata ujian yang dipilih
            const targetPage = document.getElementById('selMataUjian').value;

            // Validasi: Apakah nama yang diketik sama dengan nama login?
            if (inputNama !== dataSiswa.nama.toUpperCase()) { 
                alert("Nama tidak sesuai!"); 
                return; 
            }
            
            // Validasi: Apakah token benar?
            if (inputToken !== tokenAsli) { 
                alert("Token salah!"); 
                return; 
            }

            // Jika semua benar, alihkan ke halaman yang sesuai
            window.location.href = targetPage;
        }
    </script>
</body>
</html>
