<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SMP Darut Tauhid</title>
    <style>
        :root { 
            --pusmendik-blue: #3d79b8; 
            --bg-gray: #f4f7f9; 
            --primary-blue: #007bff; 
        }
        
        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-gray); display: flex; flex-direction: column; }
        
        /* Blue Header Section */
        .top-bar { 
            background-color: var(--pusmendik-blue); 
            height: 220px; 
            width: 100%; 
            position: absolute; 
            top: 0; 
            z-index: 1; 
            padding: 30px 50px; 
            box-sizing: border-box; 
        }
        
        .header-content { display: flex; align-items: center; color: white; gap: 20px; }
        .header-content img { height: 60px; width: auto; border-radius: 5px; }
        .header-content h1 { margin: 0; font-size: 24px; letter-spacing: 1px; }
        .header-content p { margin: 5px 0 0 0; opacity: 0.9; font-size: 14px; }

        /* Login Card Position */
        .login-container { 
            flex: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            position: relative; 
            z-index: 2; 
            margin-top: 60px; 
        }

        .login-card { 
            background: white; 
            width: 100%; 
            max-width: 400px; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            text-align: center;
        }

        .login-card h2 { margin-top: 0; color: #333; font-size: 22px; }
        .login-card p { color: #777; font-size: 14px; margin-bottom: 30px; }

        /* Rapi Input with Icons */
        .form-group { 
            position: relative; 
            margin-bottom: 25px; 
            text-align: left;
        }

        /* Styling Icon agar sejajar di kiri */
        .form-group i {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            font-style: normal;
            font-size: 18px;
            color: #555;
        }

        .form-control { 
            width: 100%; 
            border: none; 
            border-bottom: 1.5px solid #ccc; 
            padding: 10px 10px 10px 35px; /* Memberi ruang untuk icon */
            font-size: 15px; 
            box-sizing: border-box; 
            outline: none; 
            background: transparent;
            transition: all 0.3s ease;
        }

        /* Efek saat input aktif */
        .form-control:focus { 
            border-bottom-color: var(--primary-blue); 
        }

        .btn-login { 
            width: 100%; 
            padding: 12px; 
            background-color: var(--primary-blue); 
            color: white; 
            border: none; 
            border-radius: 25px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 15px;
            transition: background 0.3s;
        }

        .btn-login:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="header-content">
            <img src="https://upload.wikimedia.org/wikipedia/commons/9/9c/Logo_of_Ministry_of_Education_and_Culture_of_Republic_of_Indonesia.svg" alt="Logo">
            <div>

    <div class="login-container">
