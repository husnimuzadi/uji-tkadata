<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - SMP Darut Tauhid</title>
    <style>
        :root { 
            --pusmendik-blue: #3d79b8; 
            --bg-gray: #f0f4f7; 
            --primary-blue: #007bff; 
            --text-dark: #333;
        }
        
        * { box-sizing: border-box; }

        body, html { 
            margin: 0; 
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-gray); 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Header Biru */
        .top-bar { 
            background-color: var(--pusmendik-blue); 
            width: 100%; 
            padding: 40px 20px 100px 20px; 
            color: white;
        }
        
        .header-content { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            max-width: 500px;
            margin: 0 auto;
        }

        .header-content img { 
            height: 55px; 
            width: auto; 
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        .header-text h1 { 
            margin: 0; 
            font-size: 1.4rem; 
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .header-text p { 
            margin: 3px 0 0 0; 
            opacity: 0.9; 
            font-size: 0.85rem; 
            font-weight: 300;
        }

        /* Container Login */
        .login-container { 
            padding: 0 20px;
            margin-top: -60px; 
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .login-card { 
            background: white; 
            width: 100%; 
            max-width: 400px; 
            padding: 35px 25px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); 
            text-align: center;
        }

        .login-card h2 { 
            margin: 0 0 10px 0; 
            color: var(--text-dark); 
            font-size: 1.5rem; 
        }

        .login-card p.subtitle { 
            color: #666; 
            font-size: 0.9rem; 
            margin-bottom: 30px; 
        }

        /* Form Styling */
        .form-group { 
            position: relative; 
            margin-bottom: 20px; 
            text-align: left;
        }

        .form-group i.input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-style: normal;
            font-size: 1.1rem;
            color: #aaa;
            z-index: 2;
        }

        /* Styling baru untuk toggle password */
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-style: normal;
            font-size: 1rem;
            color: #aaa;
            z-index: 3;
            user-select: none;
        }

        .form-control { 
            width: 100%; 
            background-color: #f9f9f9;
            border: 1.5px solid #eee; 
            border-radius: 10px;
            padding: 14px 45px 14px 45px; /* Padding kanan ditambah untuk tempat mata */
            font-size: 16px; 
            outline: none; 
            transition: all 0.3s ease;
            color: var(--text-dark);
        }

        .form-control:focus { 
            border-color: var(--primary-blue); 
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(0,123,255,0.1);
        }

        .btn-login { 
            width: 100%; 
            padding: 15px; 
            background-color: var(--primary-blue); 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 1rem; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 10px;
            transition: background 0.3s, transform 0.1s;
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .footer-info {
            margin-top: 25px;
            font-size: 0.75rem;
            color: #999;
        }

        @media (max-width: 360px) {
            .header-text h1 { font-size: 1.1rem; }
            .login-card { padding: 25px 15px; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="header-content">
            <img src="logo.png" alt="Logo Kemdikbud">
            <div class="header-text">
                <h1>SMP Darut Tauhid</h1>
                <p>Simulasi ANBK TKA 2026</p>
            </div>
        </div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <h2>Selamat Datang</h2>
            <p class="subtitle">Silakan masukkan NISN dan Password anda untuk memulai ujian.</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <i class="input-icon">👤</i>
                    <input type="text" class="form-control" placeholder="Username (NISN)" id="userIn" inputmode="numeric" autocomplete="username">
                </div>
                <div class="form-group">
                    <i class="input-icon">🔒</i>
                    <input type="password" class="form-control" placeholder="Password" id="passIn" autocomplete="current-password">
                    <i class="toggle-password" onclick="togglePass()" id="eyeIcon">👁️</i>
                </div>
                <button type="button" class="btn-login" onclick="cekLogin()">MASUK</button>
            </form>

            <div class="footer-info">
                &copy; 2026 Pusmendik - SMP Darut Tauhid
            </div>
        </div>
    </div>

        function cekLogin() {
            const u = document.getElementById('userIn').value.trim();
            const p = document.getElementById('passIn').value.trim();
            
            if (u === "" || p === "") {
                alert("Harap isi Username dan Password!");
                return;
            }

            const user = database.find(d => d.username === u && d.pass === p);
            
            if(user) {
                sessionStorage.setItem("user_login", JSON.stringify(user));
                window.location.href = "datadiri.html";
            } else { 
                alert("Username atau Password Salah! Periksa kembali NISN dan kode akses Anda."); 
            }
        }

        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                cekLogin();
            }
        });
